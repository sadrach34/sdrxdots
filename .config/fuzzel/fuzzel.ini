# Configuración general de la ventana
[main]
font=JetBrainsMono Nerd Font:size=11
fields=name,generic,comment
terminal=kitty # O tu terminal preferida (kitty, alacritty, etc.)
prompt="❯ "
icon-theme=Papirus-Dark
show-actions=yes

# Tamaño y posición
width=70
tabs=4
horizontal-pad=24
vertical-pad=16
inner-pad=10

# Bordes (Estilo CSS moderno)
[border]
width=2
radius=10

# Paleta de Colores (Formato RRGGBBAA)
[colors]
background=1e1e2ecc      # Fondo con transparencia (Catppuccin Mocha)
text=cdd6f4ff            # Texto principal
match=f38ba8ff           # Color de las letras que coinciden con la búsqueda
selection=313244ff       # Fondo de la fila seleccionada
selection-text=cdd6f4ff  # Texto de la fila seleccionada
selection-match=f38ba8ff # Coincidencia en la fila seleccionada
border=89b4faff          # Color del borde exterior