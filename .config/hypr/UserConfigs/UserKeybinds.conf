# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# settings for User defaults apps - set your default terminal and file manager on this file
source= $UserConfigs/01-UserDefaults.conf

# common shortcuts


# Alt+Tab functionality for window switching


# FEATURES / EXTRAS


# Desktop zooming or magnifier

## NOTES for ja (Hyprland version 0.39 (Ubuntu 24.04))

# Waybar / Bar related

# FEATURES / EXTRAS (UserScripts)

# Panel de Control y Notificaciones

# Navigate between workspaces with mainMod + arrow keys

# Navigate between windows in current workspace with mainMod + Alt + arrow keys

# Move windows to other workspaces with mainMod + Ctrl + arrow keys

# Move windows position with mainMod + Ctrl + Alt + arrow keys

# Move/resize windows with mainMod + mouse click and dragging

# For passthrough keyboard into a VM
#submap = passthru
# to unbind
#submap = reset

# /* ---- 🔄 Scrolling Layout Controls (WS5) ---- */  #
# Navegar entre ventanas en la fila (izquierda/derecha)


# Ajustar ancho de la columna actual

# Promover ventana a columna nueva

# Alternar modo de vista (centrar o encajar)

# Captura de pantalla (módulo screenshot de quickshell)
# Win+Shift+S → abre captura; dentro hay botón para grabar pantalla

bind = $mainMod, Space, exec, $UserScripts/LaunchAppLauncher.sh # App Launcher (QS/Rofi)
bind = $mainMod, K, exec, bash $HOME/.config/quickshell/scripts/bash/toggle-config-panel.sh # Config panel (Python GTK4)
bind = $mainMod, F, exec, env MOZ_ENABLE_WAYLAND=1 MOZ_WEBRENDER=1 MOZ_USE_XINPUT2=1 zen-browser
# bind = $mainMod, F, exec, MOZ_ENABLE_WAYLAND=1 firefox # Firefox browser
bind = $mainMod, W, exec, $UserScripts/OpenWhatsApp.sh # Open WhatsApp in Firefox and focus
bind = ALT, F4, killactive # Cierra la ventana activa (Alt+F4 clásico)
bind = ALT, Tab, workspace, e+1 # kiss Keep It Simple, Stupid
bind = $mainMod, Tab, exec, qs ipc call windowswitcher toggle # Selector de ventanas (Win+Tab)
bind = $mainMod, Return, exec, $term # terminal
bind = SHIFT $mainMod, Return, exec, $term --class floating-term # terminal flotante
bind = $mainMod, E, exec, $files # file manager
bind = $mainMod, H, exec, $scriptsDir/KeyHints.sh # help / cheat sheet
bind = ALT $mainMod, R, exec, $scriptsDir/Refresh.sh # Refresh waybar, swaync, rofi, quickshell
bind = ALT $mainMod, E, exec, $scriptsDir/RofiEmoji.sh # emoji menu
bind = ALT $mainMod, O, exec, $scriptsDir/ChangeBlur.sh # Toggle blur settings
bind = $mainMod, G, exec, $scriptsDir/GMnew toggle # Hybrid GameMode (same toggle as Quickshell)
bind = ALT $mainMod, L, exec, $scriptsDir/ChangeLayout.sh # Toggle Master or Dwindle Layout
bind = ALT $mainMod, V, exec, $scriptsDir/ClipManager.sh # Clipboard Manager
bind = CTRL $mainMod, R, exec, $scriptsDir/RofiThemeSelector.sh # KooL Rofi Menu Theme Selector
bind = CTRL SHIFT $mainMod, R, exec, pkill rofi || true && $scriptsDir/RofiTRhemeSelector-modified.sh # modified Rofi Theme Selector
bind = SHIFT $mainMod, F, fullscreen # whole full screen
bind = CTRL $mainMod, F, fullscreen, 1 # fake full screen
bind = SHIFT $mainMod, Space, togglefloating # Float Mode
bind = ALT $mainMod, Space, exec, $scriptsDir/Dropterminal.sh $term # Dropdown terminal
bind = ALT $mainMod, Mouse_down, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
bind = ALT $mainMod, Mouse_up, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')"
bind = $mainMod, J, exec, pkill -SIGUSR1 waybar # Toggle hide/show waybar
bind = CTRL $mainMod, B, exec, $scriptsDir/WaybarStyles.sh # Waybar Styles Menu
bind = ALT $mainMod, B, exec, $scriptsDir/WaybarLayout.sh # Waybar Layout Menu
bind = $mainMod, M, exec, $UserScripts/RofiBeats.sh # online music using rofi
bind = $mainMod, B, exec, $UserScripts/RofiSSH.sh # online music using rofi
bind = CTRL $mainMod, W, exec, $UserScripts/LaunchWallpaperPicker.sh # WallpaperPicker (QS/Rofi)
bind = CTRL ALT, W, exec, $UserScripts/WallpaperRandom.sh # Random wallpapers
bind = ALT $mainMod, W, exec, $UserScripts/WallpaperRandom.sh # Random wallpaper (atajo adicional)
bind = SHIFT $mainMod, W, exec, $UserScripts/WallpaperNext.sh # Next wallpaper (quick)
bind = CTRL $mainMod, O, exec, hyprctl setprop active opaque toggle # disable opacity on active window
bind = SHIFT $mainMod, K, exec, $scriptsDir/KeyBinds.sh # search keybinds via rofi
bind = SHIFT $mainMod, A, exec, $scriptsDir/Animations.sh # hyprland animations menu
bind = ALT, Space, exec, $scriptsDir/SwitchKeyboardLayout.sh # Change keyboard layout globally
bind = ALT $mainMod, C, exec, $UserScripts/RofiCalc.sh # calculator (qalculate)
bind = CTRL $mainMod, M, exec, ~/.config/waybar/scripts/toggle-audio-mixer.sh # Toggle Panel de Control
bind = CTRL ALT, M, exec, $UserScripts/ToggleMonitorProfile.sh # Toggle monitor profile: normal <-> programar
bind = $mainMod, N, exec, swaync-client -t -sw # Toggle Notificaciones (SwayNC)
bind = $mainMod, Left, workspace, r-1 # Move to previous workspace
bind = $mainMod, Right, workspace, r+1 # Move to next workspace
bind = $mainMod, Up, workspace, r-1 # Move to previous workspace (alternative)
bind = $mainMod, Down, workspace, r+1 # Move to next workspace (alternative)
bind = ALT $mainMod, Left, movefocus, l # Focus window to the left
bind = ALT $mainMod, Right, movefocus, r # Focus window to the right
bind = ALT $mainMod, Up, movefocus, u # Focus window above
bind = ALT $mainMod, Down, movefocus, d # Focus window below
bind = CTRL $mainMod, Left, movetoworkspace, r-1 # Move window to previous workspace
bind = CTRL $mainMod, Right, movetoworkspace, r+1 # Move window to next workspace
bind = CTRL $mainMod, Up, movetoworkspace, r-1 # Move window to previous workspace (alternative)
bind = CTRL $mainMod, Down, movetoworkspace, r+1 # Move window to next workspace (alternative)
bind = CTRL ALT $mainMod, Left, movewindow, l # Move window to the left
bind = CTRL ALT $mainMod, Right, movewindow, r # Move window to the right
bind = CTRL ALT $mainMod, Up, movewindow, u # Move window up
bind = CTRL ALT $mainMod, Down, movewindow, d # Move window down
bindm = $mainMod, mouse:272, movewindow # Move windows with mainMod + left click
bindm = $mainMod, mouse:273, resizewindow # Resize windows with mainMod + right click
bindm = SHIFT $mainMod, mouse:272, resizewindow # Fallback resize if right-click mapping is non-standard
bind = $mainMod, Mouse_down, movefocus, l # Enfoque a la ventana de la izquierda
bind = CTRL SHIFT $mainMod, Left, movefocus, l # Enfoque a la ventana de la izquierda
bind = $mainMod, Mouse_up, movefocus, r # Enfoque a la ventana de la derecha
bind = CTRL SHIFT $mainMod, Right, movefocus, r # Enfoque a la ventana de la derecha
bind = CTRL SHIFT $mainMod, Greater, layoutmsg, colresize +0.1 # Hacer más ancha
bind = CTRL SHIFT $mainMod, Less, layoutmsg, colresize -0.1 # Hacer más angosta
bind = CTRL SHIFT $mainMod, P, layoutmsg, promote
bind = CTRL SHIFT $mainMod, F, layoutmsg, togglefit
bind = SHIFT $mainMod, S, exec, qs ipc call screenshot toggle
bind = $mainMod ALT, Return, exec, edex-ui --toggle # Toggle Edex-UI (if installed)
bind = $mainMod ALT, Q, exec, hyprctl kill
