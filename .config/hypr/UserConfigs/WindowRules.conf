# For window rules and layerrules
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

# NOTES: Actualizado para Hyprland versión 2026 (nueva sintaxis)
# Sintaxis antigua windowrulev2 está deprecada
# Nueva sintaxis: windowrule = efecto, match:propiedad valor

# Tags para navegadores
windowrule = tag +browser, match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$
windowrule = tag +browser, match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$
windowrule = tag +browser, match:class ^(chrome-.+-Default)$ # Chrome PWAs
windowrule = tag +browser, match:class ^([Cc]hromium)$
windowrule = tag +browser, match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$
windowrule = tag +browser, match:class ^(Brave-browser(-beta|-dev|-unstable)?)$
windowrule = tag +browser, match:class ^([Tt]horium-browser|[Cc]achy-browser)$
windowrule = tag +browser, match:class ^(zen-alpha|zen)$

# Tags para notificaciones
windowrule = tag +notif, match:class ^(swaync-control-center|swaync-notification-window|swaync-client|class)$

# Tags para KooL settings
windowrule = tag +sadrach34_Cheat, match:title ^(KooL Quick Cheat Sheet)$
windowrule = tag +sadrach34_Settings, match:title ^(KooL Hyprland Settings)$
windowrule = tag +KooL-Settings, match:class ^(nwg-displays|nwg-look)$

# Tags para terminales
windowrule = tag +terminal, match:class ^(Alacritty|kitty|kitty-dropterm)$

# Tags para email
windowrule = tag +email, match:class ^([Tt]hunderbird|org.gnome.Evolution)$
windowrule = tag +email, match:class ^(eu.betterbird.Betterbird)$

# Tags para proyectos
windowrule = tag +projects, match:class ^(codium|codium-url-handler|VSCodium)$
windowrule = tag +projects, match:class ^(VSCode|code-url-handler)$
windowrule = tag +projects, match:class ^(jetbrains-.+)$ # JetBrains IDEs

# Tags para screenshare
windowrule = tag +screenshare, match:class ^(com.obsproject.Studio)$

# Tags para mensajería (IM)
windowrule = tag +im, match:class ^([Ww]ebCord|[Vv]esktop)$
windowrule = tag +im, match:class ^([Ff]erdium)$
windowrule = tag +im, match:class ^([Ww]hatsapp-for-linux)$
windowrule = tag +im, match:class ^(ZapZap|com.rtosta.zapzap)$
windowrule = tag +im, match:class ^(org.telegram.desktop|io.github.tdesktop_x64.TDesktop)$
windowrule = tag +im, match:class ^(teams-for-linux)$
windowrule = tag +im, match:class ^(im.riot.Riot|Element)$ # Element Matrix client

# Tags para juegos
windowrule = tag +games, match:class ^(gamescope)$
windowrule = tag +games, match:class ^(COBBLEVERSE)$
# windowrule = tag +games, match:class ^(steam_app_\d+)$

# Tags para tiendas de juegos
# windowrule = tag +gamestore, match:class ^([Ss]team)$
windowrule = tag +gamestore, match:title ^([Ll]utris)$
windowrule = tag +gamestore, match:class ^(com.heroicgameslauncher.hgl)$

# Tags para gestores de archivos
windowrule = tag +file-manager, match:class ^([Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt)$
windowrule = tag +file-manager, match:class ^(app.drey.Warp)$

# Tags para fondos de pantalla
windowrule = tag +wallpaper, match:class ^([Ww]aytrogen)$

# Tags para multimedia
windowrule = tag +multimedia, match:class ^([Aa]udacious)$

# Tags para multimedia-video
windowrule = tag +multimedia_video, match:class ^([Mm]pv|vlc|[Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$

# Tags para configuraciones
windowrule = tag +settings, match:title ^(ROG Control)$
windowrule = tag +settings, match:class ^(wihotspot(-gui)?)$ # wifi hotspot
windowrule = tag +settings, match:class ^([Bb]aobab|org.gnome.[Bb]aobab)$ # Disk usage analyzer
windowrule = tag +settings, match:class ^(gnome-disks|wihotspot(-gui)?)$
windowrule = tag +settings, match:title (Kvantum Manager)
windowrule = tag +settings, match:class ^(file-roller|org.gnome.FileRoller)$ # archive manager
windowrule = tag +settings, match:class ^(nm-applet|nm-connection-editor|blueman-manager)$
windowrule = tag +settings, match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
windowrule = tag +settings, match:class ^(qt5ct|qt6ct|[Yy]ad)$
windowrule = tag +settings, match:class (xdg-desktop-portal-gtk)
windowrule = tag +settings, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = tag +settings, match:class ^([Rr]ofi)$
windowrule = tag +settings, match:class ^(com.sdrxdots.ConfigPanel)$
windowrule = tag +settings, match:title ^(SdrxDots Settings\*?)$

# Tags para visualizadores
windowrule = tag +viewer, match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$ # system monitor
windowrule = tag +viewer, match:class ^(evince)$ # document viewer 
windowrule = tag +viewer, match:class ^(eog|org.gnome.Loupe)$ # image viewer

# Reglas especiales de override
windowrule = no_blur on, match:tag multimedia_video*
windowrule = opacity 1.0, match:tag multimedia_video*

# POSICIÓN
# windowrule = center on, match:float 1 # warning, causa que incluso los menús floten y se centren
windowrule = center on, match:tag sadrach34_Cheat
windowrule = center on, match:tag viewer
windowrule = center on, match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*)
windowrule = center on, match:title ^(ROG Control)$
windowrule = center on, match:tag KooL-Settings
windowrule = center on, match:title ^(Keybindings)$
windowrule = center on, match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
windowrule = center on, match:class ^(com.sdrxdots.ConfigPanel)$
windowrule = center on, match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
windowrule = center on, match:class ^([Ff]erdium)$
windowrule = float on, match:class ^(xfce4-about)$
windowrule = center on, match:class ^(xfce4-about)$
windowrule = move 72% 7%, match:title ^(Picture-in-Picture)$ 
#windowrule = move 72% 7%, match:title ^(Firefox)$ 

# Reglas para evitar idle en apps fullscreen
#windowrule = idle_inhibit fullscreen, match:class ^(*)$
#windowrule = idle_inhibit fullscreen, match:title ^(*)$
windowrule = idle_inhibit fullscreen, match:fullscreen 1

# Mover a workspace
windowrule = workspace 1, match:tag email*
windowrule = workspace 1, match:tag browser*
# windowrule = workspace 3, match:class ^([Tt]hunar)$
#windowrule = workspace 3, match:tag projects*
windowrule = workspace 3, match:tag gamestore*
windowrule = workspace 4, match:tag im*
windowrule = workspace 4, match:tag games*

# Mover a workspace (silent)
windowrule = workspace 4 silent, match:tag screenshare*
windowrule = workspace 6 silent, match:class ^(virt-manager)$
windowrule = workspace 6 silent, match:class ^(.virt-manager-wrapped)$
windowrule = workspace 9 silent, match:tag multimedia*

# FLOAT
windowrule = float on, match:tag sadrach34_Cheat
windowrule = float on, match:tag wallpaper
windowrule = float on, match:tag settings
windowrule = float on, match:tag viewer
windowrule = float on, match:tag KooL-Settings
windowrule = float on, match:class ^(com.sdrxdots.ConfigPanel)$
windowrule = pin on, match:class ^(com.sdrxdots.ConfigPanel)$
windowrule = float on, match:class ^(com.sdrxdots.ConfigPanel)$
windowrule = float on, match:class ([Zz]oom|onedriver|onedriver-launcher)$
windowrule = float on, match:class (org.gnome.Calculator), match:title (Calculator)
windowrule = float on, match:class ^(mpv|com.github.rafostar.Clapper)$
windowrule = float on, match:class ^([Qq]alculate-gtk)$
#windowrule = float on, match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
windowrule = float on, match:class ^([Ff]erdium)$
windowrule = float on, match:title ^(Picture-in-Picture)$
#windowrule = float on, match:title ^(Firefox)$

# Terminal flotante personalizada (Super + Shift + Return)
windowrule = float on, match:class ^(floating-term)$
windowrule = size 70% 60%, match:class ^(floating-term)$
windowrule = center on, match:class ^(floating-term)$
windowrule = opacity 0.85 0.75, match:class ^(floating-term)$

# Float popups y diálogos
windowrule = float on, match:title ^(Authentication Required)$
windowrule = center on, match:title ^(Authentication Required)$
windowrule = float on, match:class (codium|codium-url-handler|VSCodium), match:title negative:(.*codium.*|.*VSCodium.*)
windowrule = float on, match:class ^(com.heroicgameslauncher.hgl)$, match:title negative:(Heroic Games Launcher)
windowrule = float on, match:class ^([Ss]team)$, match:title negative:^([Ss]team)$
windowrule = float on, match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*)

windowrule = float on, match:title ^(Add Folder to Workspace)$
windowrule = size 70% 60%, match:title ^(Add Folder to Workspace)$
windowrule = center on, match:title ^(Add Folder to Workspace)$

windowrule = float on, match:title ^(Save As)$
windowrule = size 70% 60%, match:title ^(Save As)$
windowrule = center on, match:title ^(Save As)$

windowrule = float on, match:initial_title (Open Files)
windowrule = size 70% 60%, match:initial_title (Open Files)

windowrule = float on, match:title ^(SDDM Background)$ #sadrach34 Dots YAD for setting SDDM background
windowrule = center on, match:title ^(SDDM Background)$ #sadrach34 Dots YAD for setting SDDM background
windowrule = size 16% 12%, match:title ^(SDDM Background)$ #sadrach34 Dots YAD for setting SDDM background
# FIN de float popups y diálogos

# OPACIDAD
windowrule = opaque on, match:tag browser  # Firefox y navegadores siempre 100% opacos
windowrule = opacity 0.9 0.8, match:tag projects*
windowrule = opaque on, match:class ^(jetbrains-studio)$
windowrule = opacity 0.94 0.86, match:tag im*
windowrule = opacity 0.94 0.86, match:tag multimedia*
windowrule = opacity 0.9 0.8, match:tag file-manager*
windowrule = opacity 0.8 0.7, match:tag terminal*
windowrule = opacity 0.8 0.7, match:tag settings*
windowrule = opaque on, match:class ^(com.sdrxdots.ConfigPanel)$
windowrule = opacity 0.82 0.75, match:tag viewer*
windowrule = opacity 0.9 0.7, match:tag wallpaper*
windowrule = opacity 0.8 0.7, match:class ^(gedit|org.gnome.TextEditor|mousepad)$
windowrule = opacity 0.9 0.8, match:class ^(deluge)$
windowrule = opacity 0.9 0.8, match:class ^(seahorse)$ # gnome-keyring gui
windowrule = opacity 1.1 1.1, match:title ^(Picture-in-Picture)$

# Regla para que MPV siempre flote
windowrule = float on, match:class ^(mpv)$

# Regla para que MPV esté "fijado" (siempre encima)
windowrule = pin on, match:class ^(mpv)$

# TAMAÑO
windowrule = size 65% 90%, match:tag sadrach34_Cheat
windowrule = size 70% 70%, match:tag wallpaper
windowrule = size 70% 70%, match:tag settings
windowrule = size 70% 70%, match:class ^(com.sdrxdots.ConfigPanel)$
windowrule = size 80% 80%, match:tag viewer
windowrule = size 60% 70%, match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
windowrule = size 60% 70%, match:class ^([Ff]erdium)$
windowrule = size 65% 80%, match:class ^(pavucontrol|org\.pulseaudio\.pavucontrol|com\.saivert\.pwvucontrol)$

#windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$   
#windowrule = size 25% 25%, match:title ^(Firefox)$ 

# PINNING
windowrule = pin on, match:title ^(Picture-in-Picture)$
#windowrule = pin on, match:title ^(Firefox)$ 

# Extras
windowrule = keep_aspect_ratio on, match:title ^(Picture-in-Picture)$

# BLUR & FULLSCREEN
windowrule = no_blur on, match:tag games*
windowrule = fullscreen on, match:tag games*

#windowrule = border_color rgb(EE4B55) rgb(880808), match:fullscreen 1
#windowrule = border_color rgb(282737) rgb(1E1D2D), match:float 1
#windowrule = opacity 0.8 0.8, match:pin 1

# LAYER RULES (nueva sintaxis)
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur on, match:namespace quickshell:overview
layerrule = ignore_alpha 0, match:namespace quickshell:overview
layerrule = ignore_alpha 0.5, match:namespace quickshell:overview
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell
layerrule = ignore_alpha 0.5, match:namespace quickshell

#layerrule = ignore_alpha 0.5, match:tag notif*

#layerrule = ignore_alpha 0, match:namespace <rofi>
#layerrule = blur on, match:namespace <rofi>
#layerrule = unset, match:namespace <rofi>

#layerrule = ignore_alpha 0, match:namespace overview
#layerrule = blur on, match:namespace overview

# eDEX-UI - siempre en workspace 5 en fullscreen
# windowrule = pin on, match:class ^(eDEX-UI)$
# windowrule = float on, match:class ^(eDEX-UI)$
windowrule = fullscreen on, match:class ^(eDEX-UI)$
windowrule = no_blur on, match:class ^(eDEX-UI)$
windowrule = workspace 3, match:class ^(eDEX-UI)$