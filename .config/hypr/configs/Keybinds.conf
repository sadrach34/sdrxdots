# Default Keybinds
# visit https://wiki.hyprland.org/Configuring/Binds/ for more info

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs
$UserScripts = $HOME/.config/hypr/UserScripts


# Master Layout

# Dwindle Layout

# Works on either layout (Master or Dwindle)

# group

# Special Keys / Hot Keys

# media controls using keyboards

# Screenshot keybindings NOTE: You may need to press Fn key as well

# screenshot with swappy (another screenshot tool) — desactivado, Win+Shift+S ahora usa el módulo quickshell

# Resize windows

# Move windows

# Swap windows

# Move focus with mainMod + arrow keys

# Workspaces related

# Special workspace

# The following mappings use the key codes to better support various keyboard layouts
# 1 is code:10, 2 is code 11, etc
# Switch workspaces with mainMod + [0-9] 

# Move active window and follow to workspace mainMod + SHIFT [0-9]

# Move active window to a workspace silently mainMod + CTRL [0-9]

# Scroll through existing workspaces with mainMod + scroll

# Move/resize windows with mainMod + LMB/RMB and dragging

bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0 # exit Hyprland
bind = $mainMod, Q, killactive # close active (not kill)
bind = SHIFT $mainMod, Q, exec, $scriptsDir/KillActiveProcess.sh # Kill active process
bind = CTRL ALT, L, exec, $scriptsDir/LockScreen.sh # screen lock
bind = CTRL ALT, P, exec, $scriptsDir/Wlogout.sh # power menu
bind = SHIFT $mainMod, N, exec, swaync-client -t -sw # swayNC notification panel
bind = SHIFT $mainMod, E, exec, $scriptsDir/Kool_Quick_Settings.sh # Settings Menu KooL Hyprland Settings
bind = CTRL $mainMod, D, layoutmsg, removemaster
bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = CTRL $mainMod, Return, layoutmsg, swapwithmaster
bind = SHIFT $mainMod, M, exec, hyprctl dispatch splitratio 0.3
bind = $mainMod, C, togglegroup # toggle group
bindel = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc # volume up
bindel = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec # volume down
bindl = , xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic # mic mute
bindl = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle # mute
bindl = , F12, exec, $scriptsDir/Volume.sh --toggle-mic # Mute/unmute microphone with F12
bindl = , xf86Sleep, exec, systemctl suspend # sleep button
bindl = , xf86Rfkill, exec, $scriptsDir/AirplaneMode.sh # Airplane mode
bindl = , xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt
bindl = , xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv
bindl = , xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop
bind = $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --now # screenshot
# bind = SHIFT $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --area # disabled: use Win+Shift+S
# bind = CTRL $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --in5 # disabled: use Win+Shift+S
# bind = CTRL SHIFT $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --in10 # disabled: use Win+Shift+S
# bind = ALT, Print, exec, $scriptsDir/ScreenShot.sh --active # disabled: use Win+Shift+S
binde = SHIFT $mainMod, Left, resizeactive, -50 0
binde = SHIFT $mainMod, Right, resizeactive, 50 0
binde = SHIFT $mainMod, Up, resizeactive, 0 -50
binde = SHIFT $mainMod, Down, resizeactive, 0 50
bind = SHIFT $mainMod, D, movetoworkspace, special
bind = $mainMod, D, togglespecialworkspace
bind = $mainMod, 1, workspace, 1 # NOTE: code:10 = key 1
bind = $mainMod, 2, workspace, 2 # NOTE: code:11 = key 2
bind = $mainMod, 3, workspace, 3 # NOTE: code:12 = key 3
bind = $mainMod, 4, workspace, 4 # NOTE: code:13 = key 4
bind = $mainMod, 5, workspace, 5 # NOTE: code:14 = key 5
bind = $mainMod, 6, workspace, 6 # NOTE: code:15 = key 6
bind = $mainMod, 7, workspace, 7 # NOTE: code:16 = key 7
bind = $mainMod, 8, workspace, 8 # NOTE: code:17 = key 8
bind = $mainMod, 9, workspace, 9 # NOTE: code:18 = key 9
bind = $mainMod, 0, workspace, 10 # NOTE: code:19 = key 0
bind = SHIFT $mainMod, 1, movetoworkspace, 1 # NOTE: code:10 = key 1
bind = SHIFT $mainMod, 2, movetoworkspace, 2 # NOTE: code:11 = key 2
bind = SHIFT $mainMod, 3, movetoworkspace, 3 # NOTE: code:12 = key 3
bind = SHIFT $mainMod, 4, movetoworkspace, 4 # NOTE: code:13 = key 4
bind = SHIFT $mainMod, 5, movetoworkspace, 5 # NOTE: code:14 = key 5
bind = SHIFT $mainMod, 6, movetoworkspace, 6 # NOTE: code:15 = key 6
bind = SHIFT $mainMod, 7, movetoworkspace, 7 # NOTE: code:16 = key 7
bind = SHIFT $mainMod, 8, movetoworkspace, 8 # NOTE: code:17 = key 8
bind = SHIFT $mainMod, 9, movetoworkspace, 9 # NOTE: code:18 = key 9
bind = SHIFT $mainMod, 0, movetoworkspace, 10 # NOTE: code:19 = key 0
bind = SHIFT $mainMod, Bracketleft, movetoworkspace, -1 # brackets [
bind = SHIFT $mainMod, Bracketright, movetoworkspace, +1 # brackets ]
bind = CTRL $mainMod, 1, movetoworkspacesilent, 1 # NOTE: code:10 = key 1
bind = CTRL $mainMod, 2, movetoworkspacesilent, 2 # NOTE: code:11 = key 2
bind = CTRL $mainMod, 3, movetoworkspacesilent, 3 # NOTE: code:12 = key 3
bind = CTRL $mainMod, 4, movetoworkspacesilent, 4 # NOTE: code:13 = key 4
bind = CTRL $mainMod, 5, movetoworkspacesilent, 5 # NOTE: code:14 = key 5
bind = CTRL $mainMod, 6, movetoworkspacesilent, 6 # NOTE: code:15 = key 6
bind = CTRL $mainMod, 7, movetoworkspacesilent, 7 # NOTE: code:16 = key 7
bind = CTRL $mainMod, 8, movetoworkspacesilent, 8 # NOTE: code:17 = key 8
bind = CTRL $mainMod, 9, movetoworkspacesilent, 9 # NOTE: code:18 = key 9
bind = CTRL $mainMod, 0, movetoworkspacesilent, 10 # NOTE: code:19 = key 0
bind = CTRL $mainMod, Bracketleft, movetoworkspacesilent, -1 # brackets [
bind = CTRL $mainMod, Bracketright, movetoworkspacesilent, +1 # brackets ]
bind = $mainMod, Mouse_down, workspace, e+1q
bind = $mainMod, Period, workspace, e+1
bind = $mainMod, Comma, workspace, e-1
bindm = $mainMod, mouse:272, movewindow # Move window with SUPER + left click drag
bindm = $mainMod, mouse:273, resizewindow # Resize window with SUPER + right click drag
bindm = SHIFT $mainMod, mouse:272, resizewindow # Fallback resize if right-click mapping is non-standard
