# Matugen template: yazi file manager theme from wallpaper

[mode]
normal_main = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
normal_alt  = { fg = "{{colors.primary.default.hex}}", bg = "reset" }
select_main = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.secondary.default.hex}}", bg = "reset" }
unset_main  = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }
unset_alt   = { fg = "{{colors.tertiary.default.hex}}", bg = "reset" }

[status]
overall = { fg = "reset", bg = "reset" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type  = { fg = "{{colors.primary.default.hex}}", bold = true }
perm_read  = { fg = "{{colors.tertiary.default.hex}}" }
perm_write = { fg = "{{colors.secondary.default.hex}}" }
perm_exec  = { fg = "{{colors.error.default.hex}}" }
perm_sep   = { fg = "{{colors.outline.default.hex}}" }

progress_label  = { fg = "{{colors.on_background.default.hex}}", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}", bg = "reset" }
progress_error  = { fg = "{{colors.error.default.hex}}", bg = "reset" }

[mgr]
cwd = { fg = "{{colors.primary.default.hex}}", bold = true }

find_keyword  = { fg = "{{colors.tertiary.default.hex}}", bold = true, italic = true, underline = true }
find_position = { fg = "{{colors.secondary.default.hex}}", bg = "reset", bold = true, italic = true }

marker_copied   = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}", bg = "{{colors.error.default.hex}}" }
marker_marked   = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }
marker_selected = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }

count_copied   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
count_cut      = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}" }
count_selected = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }

border_symbol = "│"
border_style  = { fg = "{{colors.outline.default.hex}}" }

hovered = { bg = "{{colors.surface_bright.default.hex}}" }

[indicator]
parent  = { fg = "{{colors.secondary.default.hex}}", bold = true }
current = { fg = "{{colors.primary.default.hex}}", bold = true }
preview = { fg = "{{colors.outline.default.hex}}", bold = true }
padding = { open = "", close = " " }

[tabs]
active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
inactive = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = { fg = "{{colors.primary.default.hex}}" }
value    = { fg = "{{colors.on_background.default.hex}}" }
selected = { reversed = true }

[pick]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
inactive = { fg = "{{colors.on_surface.default.hex}}" }

[confirm]
border = { fg = "{{colors.primary.default.hex}}" }
title  = { fg = "{{colors.primary.default.hex}}" }
body   = { fg = "{{colors.on_background.default.hex}}" }
list   = { fg = "{{colors.on_background.default.hex}}" }
btn_yes = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
btn_no  = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}" }
btn_labels = [ " Yes ", " No " ]

[notify]
title_info  = { fg = "{{colors.primary.default.hex}}" }
title_warn  = { fg = "{{colors.tertiary.default.hex}}" }
title_error = { fg = "{{colors.error.default.hex}}" }

[help]
on     = { fg = "{{colors.primary.default.hex}}" }
run    = { fg = "{{colors.secondary.default.hex}}" }
desc   = { fg = "{{colors.on_background.default.hex}}" }
hovered = { reversed = true }
footer  = { fg = "{{colors.outline.default.hex}}" }

[which]
cols = 3
mask = { bg = "{{colors.surface_container.default.hex}}" }
cand = { fg = "{{colors.primary.default.hex}}" }
rest = { fg = "{{colors.outline.default.hex}}" }
desc = { fg = "{{colors.on_background.default.hex}}" }
separator = " → "
separator_style = { fg = "{{colors.outline.default.hex}}" }

[tasks]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = { fg = "{{colors.primary.default.hex}}" }
hovered = { reversed = true }

[filetype]
rules = [
    { mime = "image/*", fg = "{{colors.secondary.default.hex}}" },
    { mime = "{audio,video}/*", fg = "{{colors.secondary.default.hex}}" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "{{colors.error.default.hex}}" },
    { mime = "application/{pdf,doc,rtf}", fg = "{{colors.primary.default.hex}}" },
    { url = "*/", fg = "{{colors.secondary.default.hex}}", bold = true },
    { url = "*", fg = "{{colors.tertiary.default.hex}}" },
]

[icon]
globs = []
dirs  = []
files = []
exts  = []
conds = []
