
# you can choose themes from $HOME/.config/kitty/kitty-themes/
include ./kitty-themes/00-Default.conf

font_family FantasqueSansM Nerd Font Mono Bold
font_size 14.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 1
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4

selection_foreground none
selection_background none

foreground #dddddd
background #000000
cursor #dddddd

# ── Tabs ──────────────────────────────────────────
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_bar_margin_width 0
tab_bar_margin_height 0 0

tab_bar_background #000000
active_tab_foreground   #dddddd
active_tab_background   #06ae00
active_tab_font_style   bold
inactive_tab_foreground #6272a4
inactive_tab_background #111111
inactive_tab_font_style normal

tab_title_template "{index} {bell_symbol}{activity_symbol} {title}"
tab_activity_symbol "● "
tab_bell_symbol "󰂞 "

map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+w     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+1     goto_tab 1
map ctrl+shift+2     goto_tab 2
map ctrl+shift+3     goto_tab 3
map ctrl+shift+4     goto_tab 4
map ctrl+shift+5     goto_tab 5
map ctrl+shift+alt+t set_tab_title
# fuerza zsh al abrir kitty
shell /usr/bin/zsh
